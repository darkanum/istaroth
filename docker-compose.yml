services:
  mongodb:
    image: mongo:6.0
    container_name: genshin_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    container_name: genshin_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
      - scraper

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: genshin_fastapi
    restart: always
    ports:
      - "8005:8000"
      - "9101:9101" # Porta de Métricas Prometheus da API
    depends_on:
      - mongodb
    env_file:
      - .env

  scraper:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    container_name: genshin_scraper
    restart: always
    ports:
      - "9100:9100" # Porta de Métricas Prometheus do Scraper
    depends_on:
      - mongodb
    env_file:
      - .env

volumes:
  mongo_data: